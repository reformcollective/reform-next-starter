version = 1
name = "standard"

[setup]
script = '''
git submodule update --init
MAIN=$(git worktree list --porcelain | head -1 | awk '{print $2}') && [ "$(pwd)" != "$MAIN" ] && ln -sf "$MAIN/.env" .env
pnpm install
'''

[cleanup]
script = "git submodule deinit --force --all"

[[actions]]
name = "run"
icon = "run"
command = "pnpm dev"
